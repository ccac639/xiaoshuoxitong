# AI Novel OS Lite · v2.1 一键编排
# 用法（在 backend/ 目录）：
#   cp .env.example .env
#   docker compose up --build
# 得到：postgres(+pgvector) / redis / backend(:8000) / frontend(:3000)

services:
  postgres:
    image: pgvector/pgvector:0.7.0-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xiaoshuoxitong
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/xiaoshuoxitong
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
